<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="petalGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffd4e0"/>
      <stop offset="45%" stop-color="#e8a0b8"/>
      <stop offset="100%" stop-color="#c96b85"/>
    </radialGradient>
    <radialGradient id="petalGradInner" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#ffe8ef"/>
      <stop offset="50%" stop-color="#f0b0c4"/>
      <stop offset="100%" stop-color="#d4788f"/>
    </radialGradient>
    <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="60%" stop-color="#f5d78e"/>
      <stop offset="100%" stop-color="#e8b84a"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#softGlow)">
    <!-- outer petals -->
    <ellipse cx="100" cy="118" rx="22" ry="48" fill="url(#petalGrad)" transform="rotate(0 100 100)" opacity="0.9"/>
    <ellipse cx="100" cy="118" rx="22" ry="48" fill="url(#petalGrad)" transform="rotate(40 100 100)" opacity="0.9"/>
    <ellipse cx="100" cy="118" rx="22" ry="48" fill="url(#petalGrad)" transform="rotate(80 100 100)" opacity="0.9"/>
    <ellipse cx="100" cy="118" rx="22" ry="48" fill="url(#petalGrad)" transform="rotate(120 100 100)" opacity="0.9"/>
    <ellipse cx="100" cy="118" rx="22" ry="48" fill="url(#petalGrad)" transform="rotate(160 100 100)" opacity="0.9"/>
    <ellipse cx="100" cy="118" rx="22" ry="48" fill="url(#petalGrad)" transform="rotate(200 100 100)" opacity="0.9"/>
    <ellipse cx="100" cy="118" rx="22" ry="48" fill="url(#petalGrad)" transform="rotate(240 100 100)" opacity="0.9"/>
    <ellipse cx="100" cy="118" rx="22" ry="48" fill="url(#petalGrad)" transform="rotate(280 100 100)" opacity="0.9"/>
    <ellipse cx="100" cy="118" rx="22" ry="48" fill="url(#petalGrad)" transform="rotate(320 100 100)" opacity="0.9"/>
    <!-- middle petals -->
    <ellipse cx="100" cy="108" rx="16" ry="36" fill="url(#petalGradInner)" transform="rotate(20 100 100)" opacity="0.95"/>
    <ellipse cx="100" cy="108" rx="16" ry="36" fill="url(#petalGradInner)" transform="rotate(60 100 100)" opacity="0.95"/>
    <ellipse cx="100" cy="108" rx="16" ry="36" fill="url(#petalGradInner)" transform="rotate(100 100 100)" opacity="0.95"/>
    <ellipse cx="100" cy="108" rx="16" ry="36" fill="url(#petalGradInner)" transform="rotate(140 100 100)" opacity="0.95"/>
    <ellipse cx="100" cy="108" rx="16" ry="36" fill="url(#petalGradInner)" transform="rotate(180 100 100)" opacity="0.95"/>
    <ellipse cx="100" cy="108" rx="16" ry="36" fill="url(#petalGradInner)" transform="rotate(220 100 100)" opacity="0.95"/>
    <ellipse cx="100" cy="108" rx="16" ry="36" fill="url(#petalGradInner)" transform="rotate(260 100 100)" opacity="0.95"/>
    <ellipse cx="100" cy="108" rx="16" ry="36" fill="url(#petalGradInner)" transform="rotate(300 100 100)" opacity="0.95"/>
    <ellipse cx="100" cy="108" rx="16" ry="36" fill="url(#petalGradInner)" transform="rotate(340 100 100)" opacity="0.95"/>
    <!-- inner petals -->
    <ellipse cx="100" cy="98" rx="10" ry="24" fill="#ffd4e0" transform="rotate(0 100 100)"/>
    <ellipse cx="100" cy="98" rx="10" ry="24" fill="#ffd4e0" transform="rotate(45 100 100)"/>
    <ellipse cx="100" cy="98" rx="10" ry="24" fill="#ffd4e0" transform="rotate(90 100 100)"/>
    <ellipse cx="100" cy="98" rx="10" ry="24" fill="#ffd4e0" transform="rotate(135 100 100)"/>
    <ellipse cx="100" cy="98" rx="10" ry="24" fill="#ffd4e0" transform="rotate(180 100 100)"/>
    <ellipse cx="100" cy="98" rx="10" ry="24" fill="#ffd4e0" transform="rotate(225 100 100)"/>
    <ellipse cx="100" cy="98" rx="10" ry="24" fill="#ffd4e0" transform="rotate(270 100 100)"/>
    <ellipse cx="100" cy="98" rx="10" ry="24" fill="#ffd4e0" transform="rotate(315 100 100)"/>
    <!-- center -->
    <circle cx="100" cy="100" r="14" fill="url(#centerGrad)"/>
    <circle cx="96" cy="97" r="2" fill="#e8c060" opacity="0.7"/>
    <circle cx="104" cy="97" r="2" fill="#e8c060" opacity="0.7"/>
    <circle cx="100" cy="103" r="2" fill="#e8c060" opacity="0.7"/>
    <circle cx="97" cy="102" r="1.5" fill="#e8c060" opacity="0.5"/>
    <circle cx="103" cy="102" r="1.5" fill="#e8c060" opacity="0.5"/>
  </g>
</svg>
