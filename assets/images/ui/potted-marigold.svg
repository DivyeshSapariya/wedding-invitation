<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 240" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="potBody" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#c87830"/>
      <stop offset="35%" stop-color="#9a4f18"/>
      <stop offset="72%" stop-color="#6b3410"/>
      <stop offset="100%" stop-color="#4a240a"/>
    </linearGradient>
    <linearGradient id="potHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="potRim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcefd7"/>
      <stop offset="55%" stop-color="#f2c879"/>
      <stop offset="100%" stop-color="#b8862a"/>
    </linearGradient>
    <radialGradient id="soilGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4a3020"/>
      <stop offset="100%" stop-color="#241408"/>
    </radialGradient>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f4a22"/>
      <stop offset="50%" stop-color="#3d7a3a"/>
      <stop offset="100%" stop-color="#1f4a22"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5fa855"/>
      <stop offset="100%" stop-color="#2d5c28"/>
    </linearGradient>
    <radialGradient id="marigoldOuter" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffd56a"/>
      <stop offset="45%" stop-color="#f0a020"/>
      <stop offset="100%" stop-color="#c86a08"/>
    </radialGradient>
    <radialGradient id="marigoldMid" cx="48%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#ffe08a"/>
      <stop offset="100%" stop-color="#e08818"/>
    </radialGradient>
    <radialGradient id="marigoldCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b4510"/>
      <stop offset="100%" stop-color="#5c2e08"/>
    </radialGradient>
    <radialGradient id="roseOuter" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffd8e4"/>
      <stop offset="40%" stop-color="#f0a0b8"/>
      <stop offset="100%" stop-color="#c45a78"/>
    </radialGradient>
    <radialGradient id="roseInner" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffeef3"/>
      <stop offset="100%" stop-color="#d87898"/>
    </radialGradient>
    <filter id="plantShadow" x="-30%" y="-10%" width="160%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="bloomGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="80" cy="232" rx="52" ry="8" fill="#000" opacity="0.28"/>

  <!-- Pot saucer -->
  <ellipse cx="80" cy="226" rx="58" ry="10" fill="#3a1a08" opacity="0.55"/>
  <ellipse cx="80" cy="224" rx="54" ry="8" fill="url(#potBody)" opacity="0.85"/>

  <!-- Pot body -->
  <path d="M42 178 Q38 210 48 228 Q80 238 112 228 Q122 210 118 178 Z" fill="url(#potBody)"/>
  <path d="M42 178 Q38 210 48 228 Q80 238 112 228 Q122 210 118 178 Z" fill="url(#potHighlight)" opacity="0.75"/>
  <path d="M38 176 Q80 168 122 176 L118 184 Q80 176 42 184 Z" fill="url(#potRim)"/>
  <ellipse cx="80" cy="178" rx="42" ry="9" fill="url(#soilGrad)"/>
  <ellipse cx="80" cy="176" rx="38" ry="6" fill="#1a0e06" opacity="0.35"/>

  <!-- Stems -->
  <path d="M68 174 Q58 140 52 98" stroke="url(#stemGrad)" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <path d="M80 174 Q82 130 88 72" stroke="url(#stemGrad)" stroke-width="3.6" stroke-linecap="round" fill="none"/>
  <path d="M92 174 Q102 138 108 108" stroke="url(#stemGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M74 174 Q66 148 62 118" stroke="url(#stemGrad)" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.85"/>

  <!-- Leaves -->
  <g opacity="0.95">
