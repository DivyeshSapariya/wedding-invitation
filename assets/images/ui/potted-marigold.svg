        <ellipse cx="0" cy="5" rx="9" ry="18" fill="url(#roseOuter)" transform="rotate(225)"/>
        <ellipse cx="0" cy="5" rx="9" ry="18" fill="url(#roseOuter)" transform="rotate(270)"/>
        <ellipse cx="0" cy="5" rx="9" ry="18" fill="url(#roseOuter)" transform="rotate(315)"/>
        <ellipse cx="0" cy="3" rx="6" ry="13" fill="url(#roseInner)" transform="rotate(22)"/>
        <ellipse cx="0" cy="3" rx="6" ry="13" fill="url(#roseInner)" transform="rotate(67)"/>
        <ellipse cx="0" cy="3" rx="6" ry="13" fill="url(#roseInner)" transform="rotate(112)"/>
        <ellipse cx="0" cy="3" rx="6" ry="13" fill="url(#roseInner)" transform="rotate(157)"/>
        <ellipse cx="0" cy="3" rx="6" ry="13" fill="url(#roseInner)" transform="rotate(202)"/>
        <ellipse cx="0" cy="3" rx="6" ry="13" fill="url(#roseInner)" transform="rotate(247)"/>
        <ellipse cx="0" cy="3" rx="6" ry="13" fill="url(#roseInner)" transform="rotate(292)"/>
