        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(50)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(70)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(90)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(110)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(130)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(150)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(170)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(190)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(210)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(230)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(250)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(270)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(290)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(310)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(330)"/>
        <ellipse cx="0" cy="5" rx="10" ry="22" fill="url(#marigoldMid)" transform="rotate(350)"/>
        <circle cx="0" cy="2" r="12" fill="url(#marigoldCenter)"/>
        <circle cx="-3" cy="-1" r="1.5" fill="#a85810" opacity="0.65"/>
