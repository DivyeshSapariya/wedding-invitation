        <ellipse cx="0" cy="6" rx="10" ry="22" fill="url(#marigoldOuter)" transform="rotate(176)"/>
        <ellipse cx="0" cy="6" rx="10" ry="22" fill="url(#marigoldOuter)" transform="rotate(198)"/>
