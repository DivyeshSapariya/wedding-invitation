        <ellipse cx="0" cy="4" rx="7" ry="16" fill="url(#marigoldMid)" transform="rotate(121)"/>
        <ellipse cx="0" cy="4" rx="7" ry="16" fill="url(#marigoldMid)" transform="rotate(143)"/>
        <ellipse cx="0" cy="4" rx="7" ry="16" fill="url(#marigoldMid)" transform="rotate(165)"/>
        <ellipse cx="0" cy="4" rx="7" ry="16" fill="url(#marigoldMid)" transform="rotate(187)"/>
        <ellipse cx="0" cy="4" rx="7" ry="16" fill="url(#marigoldMid)" transform="rotate(209)"/>
        <ellipse cx="0" cy="4" rx="7" ry="16" fill="url(#marigoldMid)" transform="rotate(231)"/>
        <ellipse cx="0" cy="4" rx="7" ry="16" fill="url(#marigoldMid)" transform="rotate(253)"/>
        <ellipse cx="0" cy="4" rx="7" ry="16" fill="url(#marigoldMid)" transform="rotate(275)"/>
        <ellipse cx="0" cy="4" rx="7" ry="16" fill="url(#marigoldMid)" transform="rotate(297)"/>
        <ellipse cx="0" cy="4" rx="7" ry="16" fill="url(#marigoldMid)" transform="rotate(319)"/>
