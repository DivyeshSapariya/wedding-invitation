    <path d="M56 132 Q44 126 42 138 Q48 148 58 142 Q62 136 56 132Z" fill="none" stroke="#1a3a18" stroke-width="0.6" opacity="0.5"/>
    <path d="M94 148 Q108 142 112 154 Q104 162 92 156 Q88 150 94 148Z" fill="url(#leafGrad)"/>
    <path d="M94 148 Q108 142 112 154 Q104 162 92 156 Q88 150 94 148Z" fill="none" stroke="#1a3a18" stroke-width="0.6" opacity="0.5"/>
    <path d="M70 158 Q58 152 56 164 Q62 172 72 166 Q74 160 70 158Z" fill="url(#leafGrad)"/>
    <path d="M86 122 Q98 116 100 128 Q92 136 82 130 Q80 124 86 122Z" fill="url(#leafGrad)"/>
    <path d="M104 118 Q118 112 120 124 Q110 132 100 126 Q98 120 104 118Z" fill="url(#leafGrad)"/>
  </g>

  <g filter="url(#plantShadow)">
