<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 290" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="potBody" x1="28%" y1="0%" x2="72%" y2="100%">
      <stop offset="0%" stop-color="#c87830"/>
      <stop offset="32%" stop-color="#9a4f18"/>
      <stop offset="70%" stop-color="#6b3410"/>
      <stop offset="100%" stop-color="#4a240a"/>
    </linearGradient>
    <linearGradient id="potHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.3"/>
      <stop offset="42%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="potRim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcefd7"/>
      <stop offset="55%" stop-color="#f2c879"/>
      <stop offset="100%" stop-color="#b8862a"/>
    </linearGradient>
    <radialGradient id="soilGrad" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#4a3020"/>
      <stop offset="100%" stop-color="#241408"/>
    </radialGradient>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f4a22"/>
      <stop offset="50%" stop-color="#3d7a3a"/>
      <stop offset="100%" stop-color="#1f4a22"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5fa855"/>
      <stop offset="100%" stop-color="#2d5c28"/>
    </linearGradient>
    <radialGradient id="roseOuter" cx="38%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#ffd8e4"/>
      <stop offset="38%" stop-color="#f0a0b8"/>
      <stop offset="100%" stop-color="#c45a78"/>
    </radialGradient>
    <radialGradient id="roseMid" cx="42%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#ffeef3"/>
      <stop offset="100%" stop-color="#d87898"/>
    </radialGradient>
    <radialGradient id="roseDeep" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#ff98b0"/>
      <stop offset="45%" stop-color="#e85878"/>
      <stop offset="100%" stop-color="#a83050"/>
    </radialGradient>
    <radialGradient id="roseCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd0dc"/>
      <stop offset="100%" stop-color="#c85070"/>
    </radialGradient>
    <filter id="plantShadow" x="-30%" y="-10%" width="160%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <filter id="bloomGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="80" cy="282" rx="56" ry="8" fill="#000" opacity="0.3"/>

  <!-- Pot saucer -->
  <ellipse cx="80" cy="276" rx="62" ry="11" fill="#3a1a08" opacity="0.58"/>
  <ellipse cx="80" cy="274" rx="58" ry="9" fill="url(#potBody)" opacity="0.88"/>

  <!-- Tall pot body -->
  <path d="M36 152 Q30 200 42 262 Q80 278 118 262 Q130 200 124 152 Z" fill="url(#potBody)"/>
  <path d="M36 152 Q30 200 42 262 Q80 278 118 262 Q130 200 124 152 Z" fill="url(#potHighlight)" opacity="0.78"/>
  <path d="M32 150 Q80 140 128 150 L124 162 Q80 152 36 162 Z" fill="url(#potRim)"/>
  <ellipse cx="80" cy="152" rx="46" ry="10" fill="url(#soilGrad)"/>
  <ellipse cx="80" cy="150" rx="42" ry="7" fill="#1a0e06" opacity="0.38"/>

  <!-- Stems -->
  <path d="M64 148 Q52 108 46 62" stroke="url(#stemGrad)" stroke-width="3.4" stroke-linecap="round" fill="none"/>
  <path d="M80 148 Q84 100 90 48" stroke="url(#stemGrad)" stroke-width="3.8" stroke-linecap="round" fill="none"/>
  <path d="M96 148 Q108 112 114 78" stroke="url(#stemGrad)" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <path d="M72 148 Q68 124 66 96" stroke="url(#stemGrad)" stroke-width="2.6" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M88 148 Q94 128 98 104" stroke="url(#stemGrad)" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.85"/>

  <!-- Leaves -->
  <g opacity="0.96">
    <path d="M52 118 Q38 110 36 124 Q44 136 56 128 Q58 122 52 118Z" fill="url(#leafGrad)"/>
    <path d="M52 118 Q38 110 36 124 Q44 136 56 128 Q58 122 52 118Z" fill="none" stroke="#1a3a18" stroke-width="0.6" opacity="0.45"/>
    <path d="M102 132 Q118 124 122 138 Q112 148 98 140 Q96 134 102 132Z" fill="url(#leafGrad)"/>
    <path d="M74 138 Q60 132 58 146 Q66 156 78 148 Q80 142 74 138Z" fill="url(#leafGrad)"/>
    <path d="M92 108 Q106 100 110 112 Q100 122 88 114 Q86 108 92 108Z" fill="url(#leafGrad)"/>
    <path d="M58 88 Q44 82 42 94 Q50 104 60 98 Q62 92 58 88Z" fill="url(#leafGrad)"/>
    <path d="M108 92 Q122 86 124 98 Q114 108 102 100 Q100 94 108 92Z" fill="url(#leafGrad)"/>
  </g>

  <g filter="url(#plantShadow)">
    <!-- Left rose -->
    <g transform="translate(46 62)">
      <g filter="url(#bloomGlow)">
        <ellipse cx="0" cy="6" rx="11" ry="22" fill="url(#roseOuter)" transform="rotate(0)"/>
        <ellipse cx="0" cy="6" rx="11" ry="22" fill="url(#roseOuter)" transform="rotate(36)"/>
        <ellipse cx="0" cy="6" rx="11" ry="22" fill="url(#roseOuter)" transform="rotate(72)"/>
        <ellipse cx="0" cy="6" rx="11" ry="22" fill="url(#roseOuter)" transform="rotate(108)"/>
        <ellipse cx="0" cy="6" rx="11" ry="22" fill="url(#roseOuter)" transform="rotate(144)"/>
        <ellipse cx="0" cy="6" rx="11" ry="22" fill="url(#roseOuter)" transform="rotate(180)"/>
        <ellipse cx="0" cy="6" rx="11" ry="22" fill="url(#roseOuter)" transform="rotate(216)"/>
        <ellipse cx="0" cy="6" rx="11" ry="22" fill="url(#roseOuter)" transform="rotate(252)"/>
        <ellipse cx="0" cy="6" rx="11" ry="22" fill="url(#roseOuter)" transform="rotate(288)"/>
        <ellipse cx="0" cy="6" rx="11" ry="22" fill="url(#roseOuter)" transform="rotate(324)"/>
        <ellipse cx="0" cy="4" rx="8" ry="16" fill="url(#roseMid)" transform="rotate(18)"/>
        <ellipse cx="0" cy="4" rx="8" ry="16" fill="url(#roseMid)" transform="rotate(54)"/>
        <ellipse cx="0" cy="4" rx="8" ry="16" fill="url(#roseMid)" transform="rotate(90)"/>
        <ellipse cx="0" cy="4" rx="8" ry="16" fill="url(#roseMid)" transform="rotate(126)"/>
        <ellipse cx="0" cy="4" rx="8" ry="16" fill="url(#roseMid)" transform="rotate(162)"/>
        <ellipse cx="0" cy="4" rx="8" ry="16" fill="url(#roseMid)" transform="rotate(198)"/>
        <ellipse cx="0" cy="4" rx="8" ry="16" fill="url(#roseMid)" transform="rotate(234)"/>
        <ellipse cx="0" cy="4" rx="8" ry="16" fill="url(#roseMid)" transform="rotate(270)"/>
        <ellipse cx="0" cy="4" rx="8" ry="16" fill="url(#roseMid)" transform="rotate(306)"/>
        <ellipse cx="0" cy="4" rx="8" ry="16" fill="url(#roseMid)" transform="rotate(342)"/>
        <circle cx="0" cy="1" r="7" fill="url(#roseCenter)"/>
        <path d="M-4 -3 Q0 -8 4 -3 Q2 -1 0 1 Q-2 -1 -4 -3Z" fill="#ffe8ef" opacity="0.9"/>
      </g>
    </g>

    <!-- Center main rose (largest) -->
    <g transform="translate(90 48)">
      <g filter="url(#bloomGlow)">
        <ellipse cx="0" cy="8" rx="15" ry="30" fill="url(#roseDeep)" transform="rotate(0)"/>
        <ellipse cx="0" cy="8" rx="15" ry="30" fill="url(#roseDeep)" transform="rotate(30)"/>
        <ellipse cx="0" cy="8" rx="15" ry="30" fill="url(#roseDeep)" transform="rotate(60)"/>
        <ellipse cx="0" cy="8" rx="15" ry="30" fill="url(#roseDeep)" transform="rotate(90)"/>
        <ellipse cx="0" cy="8" rx="15" ry="30" fill="url(#roseDeep)" transform="rotate(120)"/>
        <ellipse cx="0" cy="8" rx="15" ry="30" fill="url(#roseDeep)" transform="rotate(150)"/>
        <ellipse cx="0" cy="8" rx="15" ry="30" fill="url(#roseDeep)" transform="rotate(180)"/>
        <ellipse cx="0" cy="8" rx="15" ry="30" fill="url(#roseDeep)" transform="rotate(210)"/>
        <ellipse cx="0" cy="8" rx="15" ry="30" fill="url(#roseDeep)" transform="rotate(240)"/>
        <ellipse cx="0" cy="8" rx="15" ry="30" fill="url(#roseDeep)" transform="rotate(270)"/>
        <ellipse cx="0" cy="8" rx="15" ry="30" fill="url(#roseDeep)" transform="rotate(300)"/>
        <ellipse cx="0" cy="8" rx="15" ry="30" fill="url(#roseDeep)" transform="rotate(330)"/>
        <ellipse cx="0" cy="5" rx="11" ry="22" fill="url(#roseMid)" transform="rotate(15)"/>
        <ellipse cx="0" cy="5" rx="11" ry="22" fill="url(#roseMid)" transform="rotate(45)"/>
        <ellipse cx="0" cy="5" rx="11" ry="22" fill="url(#roseMid)" transform="rotate(75)"/>
        <ellipse cx="0" cy="5" rx="11" ry="22" fill="url(#roseMid)" transform="rotate(105)"/>
        <ellipse cx="0" cy="5" rx="11" ry="22" fill="url(#roseMid)" transform="rotate(135)"/>
        <ellipse cx="0" cy="5" rx="11" ry="22" fill="url(#roseMid)" transform="rotate(165)"/>
        <ellipse cx="0" cy="5" rx="11" ry="22" fill="url(#roseMid)" transform="rotate(195)"/>
        <ellipse cx="0" cy="5" rx="11" ry="22" fill="url(#roseMid)" transform="rotate(225)"/>
        <ellipse cx="0" cy="5" rx="11" ry="22" fill="url(#roseMid)" transform="rotate(255)"/>
        <ellipse cx="0" cy="5" rx="11" ry="22" fill="url(#roseMid)" transform="rotate(285)"/>
        <ellipse cx="0" cy="5" rx="11" ry="22" fill="url(#roseMid)" transform="rotate(315)"/>
        <ellipse cx="0" cy="5" rx="11" ry="22" fill="url(#roseMid)" transform="rotate(345)"/>
        <circle cx="0" cy="2" r="10" fill="#c84868"/>
        <path d="M-5 -4 Q0 -10 5 -4 Q2 -1 0 2 Q-2 -1 -5 -4Z" fill="#ffd0dc" opacity="0.92"/>
        <path d="M-2 -6 Q0 -9 2 -6 Q1 -4 0 -2 Q-1 -4 -2 -6Z" fill="#ffe8ef" opacity="0.75"/>
      </g>
    </g>

    <!-- Right rose -->
    <g transform="translate(114 78)">
      <g filter="url(#bloomGlow)">
        <ellipse cx="0" cy="5" rx="10" ry="20" fill="url(#roseOuter)" transform="rotate(0)"/>
        <ellipse cx="0" cy="5" rx="10" ry="20" fill="url(#roseOuter)" transform="rotate(40)"/>
        <ellipse cx="0" cy="5" rx="10" ry="20" fill="url(#roseOuter)" transform="rotate(80)"/>
        <ellipse cx="0" cy="5" rx="10" ry="20" fill="url(#roseOuter)" transform="rotate(120)"/>
        <ellipse cx="0" cy="5" rx="10" ry="20" fill="url(#roseOuter)" transform="rotate(160)"/>
        <ellipse cx="0" cy="5" rx="10" ry="20" fill="url(#roseOuter)" transform="rotate(200)"/>
        <ellipse cx="0" cy="5" rx="10" ry="20" fill="url(#roseOuter)" transform="rotate(240)"/>
        <ellipse cx="0" cy="5" rx="10" ry="20" fill="url(#roseOuter)" transform="rotate(280)"/>
        <ellipse cx="0" cy="5" rx="10" ry="20" fill="url(#roseOuter)" transform="rotate(320)"/>
        <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseMid)" transform="rotate(20)"/>
        <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseMid)" transform="rotate(60)"/>
        <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseMid)" transform="rotate(100)"/>
        <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseMid)" transform="rotate(140)"/>
        <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseMid)" transform="rotate(180)"/>
        <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseMid)" transform="rotate(220)"/>
        <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseMid)" transform="rotate(260)"/>
        <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseMid)" transform="rotate(300)"/>
        <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseMid)" transform="rotate(340)"/>
        <circle cx="0" cy="1" r="6" fill="url(#roseCenter)"/>
        <path d="M-3 -2 Q0 -6 3 -2 Q1 0 0 2 Q-1 0 -3 -2Z" fill="#ffeef3" opacity="0.88"/>
      </g>
    </g>

    <!-- Small bud roses -->
    <g transform="translate(66 96)">
      <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseOuter)" transform="rotate(0)"/>
      <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseOuter)" transform="rotate(45)"/>
      <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseOuter)" transform="rotate(90)"/>
      <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseOuter)" transform="rotate(135)"/>
      <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseOuter)" transform="rotate(180)"/>
      <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseOuter)" transform="rotate(225)"/>
      <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseOuter)" transform="rotate(270)"/>
      <ellipse cx="0" cy="3" rx="7" ry="14" fill="url(#roseOuter)" transform="rotate(315)"/>
      <circle cx="0" cy="1" r="4.5" fill="#d86888"/>
    </g>

    <g transform="translate(98 104)">
      <ellipse cx="0" cy="3" rx="6" ry="12" fill="url(#roseMid)" transform="rotate(0)"/>
      <ellipse cx="0" cy="3" rx="6" ry="12" fill="url(#roseMid)" transform="rotate(45)"/>
      <ellipse cx="0" cy="3" rx="6" ry="12" fill="url(#roseMid)" transform="rotate(90)"/>
      <ellipse cx="0" cy="3" rx="6" ry="12" fill="url(#roseMid)" transform="rotate(135)"/>
      <ellipse cx="0" cy="3" rx="6" ry="12" fill="url(#roseMid)" transform="rotate(180)"/>
      <ellipse cx="0" cy="3" rx="6" ry="12" fill="url(#roseMid)" transform="rotate(225)"/>
      <ellipse cx="0" cy="3" rx="6" ry="12" fill="url(#roseMid)" transform="rotate(270)"/>
      <ellipse cx="0" cy="3" rx="6" ry="12" fill="url(#roseMid)" transform="rotate(315)"/>
      <circle cx="0" cy="1" r="4" fill="#c85878"/>
    </g>
  </g>
</svg>
