<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c79a3b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8f6a1c" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  <!-- outer ring -->
  <circle cx="200" cy="200" r="188" stroke="#8f6a1c" stroke-width="1.2" opacity="0.55"/>
  <circle cx="200" cy="200" r="176" stroke="#5e0f17" stroke-width="0.8" opacity="0.35" stroke-dasharray="4 6"/>
  <!-- eight lotus petals -->
  <g opacity="0.7">
    <path d="M200 36 C210 80 230 110 200 130 C170 110 190 80 200 36Z" fill="#c79a3b" transform="rotate(0 200 200)"/>
    <path d="M200 36 C210 80 230 110 200 130 C170 110 190 80 200 36Z" fill="#c79a3b" transform="rotate(45 200 200)"/>
    <path d="M200 36 C210 80 230 110 200 130 C170 110 190 80 200 36Z" fill="#c79a3b" transform="rotate(90 200 200)"/>
    <path d="M200 36 C210 80 230 110 200 130 C170 110 190 80 200 36Z" fill="#c79a3b" transform="rotate(135 200 200)"/>
    <path d="M200 36 C210 80 230 110 200 130 C170 110 190 80 200 36Z" fill="#c79a3b" transform="rotate(180 200 200)"/>
    <path d="M200 36 C210 80 230 110 200 130 C170 110 190 80 200 36Z" fill="#c79a3b" transform="rotate(225 200 200)"/>
    <path d="M200 36 C210 80 230 110 200 130 C170 110 190 80 200 36Z" fill="#c79a3b" transform="rotate(270 200 200)"/>
    <path d="M200 36 C210 80 230 110 200 130 C170 110 190 80 200 36Z" fill="#c79a3b" transform="rotate(315 200 200)"/>
  </g>
  <!-- inner petals -->
  <g opacity="0.55">
    <path d="M200 88 C206 118 218 136 200 148 C182 136 194 118 200 88Z" fill="#5e0f17" transform="rotate(22.5 200 200)"/>
    <path d="M200 88 C206 118 218 136 200 148 C182 136 194 118 200 88Z" fill="#5e0f17" transform="rotate(67.5 200 200)"/>
    <path d="M200 88 C206 118 218 136 200 148 C182 136 194 118 200 88Z" fill="#5e0f17" transform="rotate(112.5 200 200)"/>
    <path d="M200 88 C206 118 218 136 200 148 C182 136 194 118 200 88Z" fill="#5e0f17" transform="rotate(157.5 200 200)"/>
    <path d="M200 88 C206 118 218 136 200 148 C182 136 194 118 200 88Z" fill="#5e0f17" transform="rotate(202.5 200 200)"/>
    <path d="M200 88 C206 118 218 136 200 148 C182 136 194 118 200 88Z" fill="#5e0f17" transform="rotate(247.5 200 200)"/>
    <path d="M200 88 C206 118 218 136 200 148 C182 136 194 118 200 88Z" fill="#5e0f17" transform="rotate(292.5 200 200)"/>
    <path d="M200 88 C206 118 218 136 200 148 C182 136 194 118 200 88Z" fill="#5e0f17" transform="rotate(337.5 200 200)"/>
  </g>
  <!-- kolam dots ring -->
  <g fill="#8f6a1c" opacity="0.65">
    <circle cx="200" cy="28" r="3.5"/><circle cx="200" cy="372" r="3.5"/>
    <circle cx="28" cy="200" r="3.5"/><circle cx="372" cy="200" r="3.5"/>
    <circle cx="78" cy="78" r="2.8"/><circle cx="322" cy="78" r="2.8"/>
    <circle cx="78" cy="322" r="2.8"/><circle cx="322" cy="322" r="2.8"/>
    <circle cx="128" cy="48" r="2.2"/><circle cx="272" cy="48" r="2.2"/>
    <circle cx="128" cy="352" r="2.2"/><circle cx="272" cy="352" r="2.2"/>
    <circle cx="48" cy="128" r="2.2"/><circle cx="352" cy="128" r="2.2"/>
    <circle cx="48" cy="272" r="2.2"/><circle cx="352" cy="272" r="2.2"/>
  </g>
  <!-- center -->
  <circle cx="200" cy="200" r="42" stroke="#c79a3b" stroke-width="1.5" opacity="0.6"/>
  <circle cx="200" cy="200" r="28" fill="url(#rg)" opacity="0.45"/>
  <circle cx="200" cy="200" r="10" fill="#5e0f17" opacity="0.5"/>
  <!-- curved kolam arms -->
  <g stroke="#c79a3b" stroke-width="1" opacity="0.45" fill="none">
    <path d="M200 160 Q240 200 200 240 Q160 200 200 160"/>
    <path d="M160 200 Q200 160 240 200 Q200 240 160 200"/>
  </g>
